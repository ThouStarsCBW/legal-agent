<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>D06 智慧法律助手原型</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="flex h-screen">

        <div class="w-64 bg-white shadow-lg flex flex-col">
            <div class="p-6 bg-blue-600 text-white text-xl font-bold">⚖️ 智慧法律系统</div>
            <nav class="flex-1 p-4 space-y-2">
                <button @click="currentTab = 'chat'" :class="{'bg-blue-100 text-blue-700': currentTab === 'chat'}" class="w-full text-left p-3 rounded hover:bg-gray-100 font-medium">💬 法律问答</button>
                <button @click="currentTab = 'search'" :class="{'bg-blue-100 text-blue-700': currentTab === 'search'}" class="w-full text-left p-3 rounded hover:bg-gray-100 font-medium">🔍 知识库检索</button>
                <button @click="currentTab = 'ocr'" :class="{'bg-blue-100 text-blue-700': currentTab === 'ocr'}" class="w-full text-left p-3 rounded hover:bg-gray-100 font-medium">📄 文件识别审查</button>
                <button @click="currentTab = 'doc'" :class="{'bg-blue-100 text-blue-700': currentTab === 'doc'}" class="w-full text-left p-3 rounded hover:bg-gray-100 font-medium">✍️ 文书自动生成</button>
            </nav>
        </div>

        <div class="flex-1 p-8 overflow-y-auto">

            <div v-if="currentTab === 'chat'" class="bg-white p-6 rounded-lg shadow h-full flex flex-col">
                <h2 class="text-2xl font-bold mb-4">法律问答 (预留接入腾讯大模型)</h2>
                <div class="flex-1 bg-gray-50 rounded p-4 mb-4 overflow-y-auto">
                    <div v-for="(msg, index) in chatHistory" :key="index" class="mb-4">
                        <div :class="msg.role === 'user' ? 'text-blue-600 font-bold' : 'text-green-600 font-bold'">
                            {{ msg.role === 'user' ? '🧑 用户：' : '🤖 AI：' }}
                        </div>
                        <div class="mt-1 text-gray-700 whitespace-pre-wrap">{{ msg.content }}</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input v-model="chatInput" @keyup.enter="sendChat" type="text" placeholder="输入您的法律问题..." class="flex-1 border p-3 rounded focus:outline-none focus:border-blue-500">
                    <button @click="sendChat" class="bg-blue-600 text-white px-8 py-2 rounded hover:bg-blue-700 font-bold">发送</button>
                </div>
            </div>

            <div v-if="currentTab === 'search'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-4">知识库检索 (预留接入得理API)</h2>
                <div class="flex gap-2 mb-6">
                    <input v-model="searchKeyword" @keyup.enter="doSearch" type="text" placeholder="输入案由、法条关键词进行检索..." class="flex-1 border p-3 rounded focus:outline-none focus:border-blue-500">
                    <button @click="doSearch" class="bg-blue-600 text-white px-8 py-2 rounded hover:bg-blue-700 font-bold">检索</button>
                </div>
                <div v-if="searchResults.length > 0" class="space-y-4">
                    <div v-for="(res, index) in searchResults" :key="index" class="p-4 border border-l-4 border-l-blue-500 rounded bg-gray-50">
                        <h3 class="font-bold text-lg text-gray-800">{{ res.title }}</h3>
                        <p class="text-gray-600 mt-2">{{ res.content }}</p>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'ocr'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-4">智能文件审查 (YOLO/OCR)</h2>
                <div class="mb-6 border-2 border-dashed border-gray-300 p-6 rounded-lg text-center bg-gray-50">
                    <input type="file" @change="handleFileUpload" class="mb-4 mx-auto block text-gray-600">
                    <button @click="doOcr" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-bold">上传并启动 AI 分析</button>
                </div>

                <div v-if="ocrResult" class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-5 rounded border shadow-sm">
                        <h3 class="font-bold text-lg mb-3 text-gray-700">📝 OCR 提取原文</h3>
                        <pre class="whitespace-pre-wrap text-sm text-gray-600 font-sans">{{ ocrResult.text }}</pre>
                    </div>
                    <div class="bg-red-50 p-5 rounded border border-red-200 shadow-sm">
                        <h3 class="font-bold text-lg mb-3 text-red-700">⚠️ 大模型风险审查报告</h3>
                        <p class="text-red-600 leading-relaxed">{{ ocrResult.risk }}</p>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'doc'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-6">AI 文书与合同起草</h2>
                <div class="space-y-5 max-w-2xl">
                    <div>
                        <label class="block mb-2 font-bold text-gray-700">请选择文书类型</label>
                        <select v-model="docForm.doc_type" class="w-full border p-3 rounded bg-gray-50 focus:bg-white focus:outline-none focus:border-blue-500 text-lg">
                            <option value="contract">📝 通用合同智能起草</option>
                            <option value="complaint">⚖️ 民事起诉状</option>
                        </select>
                    </div>

                    <div v-if="docForm.doc_type === 'contract'" class="space-y-4 p-5 border rounded-lg bg-green-50">
                        <div>
                            <label class="block mb-1 font-medium text-green-800">合同名称 (如：股权转让协议、保密合同)</label>
                            <input v-model="docForm.contract_name" type="text" placeholder="请输入具体的合同类型" class="w-full border p-2 rounded">
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block mb-1 font-medium text-green-800">甲方名称 (如：出卖人、雇主)</label>
                                <input v-model="docForm.party_a" type="text" class="w-full border p-2 rounded">
                            </div>
                            <div class="flex-1">
                                <label class="block mb-1 font-medium text-green-800">乙方名称 (如：买受人、员工)</label>
                                <input v-model="docForm.party_b" type="text" class="w-full border p-2 rounded">
                            </div>
                        </div>
                        <div>
                            <label class="block mb-1 font-medium text-green-800">核心交易条件与业务诉求 (告诉AI合同里必须包含什么)</label>
                            <textarea v-model="docForm.requirements" placeholder="例如：合作期限3年，项目分三期打款，需要包含严格的保密条款和违约条款..." class="w-full border p-2 rounded h-28"></textarea>
                        </div>
                    </div>

                    <div v-if="docForm.doc_type === 'complaint'" class="space-y-4 p-5 border rounded-lg bg-blue-50">
                        <div><label class="block mb-1 font-medium text-blue-800">原告姓名</label><input v-model="docForm.plaintiff" type="text" class="w-full border p-2 rounded"></div>
                        <div><label class="block mb-1 font-medium text-blue-800">被告姓名</label><input v-model="docForm.defendant" type="text" class="w-full border p-2 rounded"></div>
                        <div><label class="block mb-1 font-medium text-blue-800">诉讼请求提纲</label><textarea v-model="docForm.demand" placeholder="例如：请求判令被告偿还借款本金10万元及利息..." class="w-full border p-2 rounded h-24"></textarea></div>
                    </div>

                    <button @click="generateDoc" class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 w-full font-bold text-lg shadow-md transition duration-200">
                        🚀 结合大模型一键生成 Word 文书
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        createApp({
            setup() {
                const baseUrl = 'http://127.0.0.1:5000/api';
                const currentTab = ref('chat');

                // 模块 1：聊天逻辑
                const chatInput = ref('');
                const chatHistory = ref([]);
                const sendChat = async () => {
                    if(!chatInput.value) return;
                    chatHistory.value.push({ role: 'user', content: chatInput.value });
                    const msg = chatInput.value;
                    chatInput.value = '大模型正在思考...';
                    try {
                        const res = await fetch(`${baseUrl}/chat`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ message: msg })
                        });
                        const data = await res.json();
                        chatInput.value = '';
                        chatHistory.value.push({ role: 'assistant', content: data.data.reply });
                    } catch(e) {
                        alert("后端 Flask 服务未启动或连接失败！");
                        chatInput.value = '';
                    }
                };

                // 模块 2：知识库检索逻辑
                const searchKeyword = ref('');
                const searchResults = ref([]);
                const doSearch = async () => {
                    if(!searchKeyword.value) return;
                    const res = await fetch(`${baseUrl}/search?keyword=${searchKeyword.value}`);
                    const data = await res.json();
                    searchResults.value = data.data.results;
                };

                // 模块 3：OCR文件审查逻辑
                const selectedFile = ref(null);
                const ocrResult = ref(null);
                const handleFileUpload = (event) => { selectedFile.value = event.target.files[0]; };
                const doOcr = async () => {
                    if(!selectedFile.value) return alert("请先选择待审查的文件");
                    const formData = new FormData();
                    formData.append('file', selectedFile.value);
                    const res = await fetch(`${baseUrl}/ocr`, { method: 'POST', body: formData });
                    const data = await res.json();
                    ocrResult.value = data.data;
                };

                // 模块 4：通用文书与合同生成逻辑
                // 预置所有可能用到的表单字段状态
                const docForm = reactive({
                    doc_type: 'contract', // 默认选中通用合同
                    plaintiff: '', defendant: '', demand: '',
                    contract_name: '', party_a: '', party_b: '', requirements: '',
                    client: '', recipient: ''
                });

                const generateDoc = async () => {
                    // 前端基础拦截校验
                    if (docForm.doc_type === 'complaint' && !docForm.plaintiff) return alert("请填写起诉状原告姓名");
                    if (docForm.doc_type === 'contract' && !docForm.contract_name) return alert("请填写合同名称");
                    if (docForm.doc_type === 'lawyer_letter' && !docForm.client) return alert("请填写委托人名称");

                    try {
                        const res = await fetch(`${baseUrl}/generate`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(docForm)
                        });

                        // 拦截后端返回的 JSON 报错（如模板文件缺失）
                        if (!res.ok || res.headers.get("content-type")?.includes("application/json")) {
                            const errorData = await res.json();
                            alert("❌ 生成失败：" + errorData.msg);
                            return;
                        }

                        // 处理文件流下载
                        const blob = await res.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;

                        // 动态获取后端设置的下载文件名
                        const disposition = res.headers.get('Content-Disposition');
                        let fileName = "生成文书.docx";
                        if (disposition && disposition.indexOf('filename=') !== -1) {
                            // 兼容中文文件名的解码提取
                            fileName = decodeURIComponent(disposition.split('filename=')[1].replace(/UTF-8''/, '').replace(/"/g, ''));
                        }
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                    } catch(e) {
                        alert("⚠️ 请求失败，请检查后端 Python 终端是否正在运行，且没有报错。");
                    }
                };

                return {
                    currentTab, chatInput, chatHistory, sendChat,
                    searchKeyword, searchResults, doSearch,
                    handleFileUpload, doOcr, ocrResult,
                    docForm, generateDoc
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
