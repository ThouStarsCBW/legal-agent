<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智慧法律助手原型</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="flex h-screen">

        <div class="w-64 bg-white shadow-lg flex flex-col">
            <div class="p-6 bg-blue-600 text-white text-xl font-bold">⚖️ 智慧法律系统</div>
            <nav class="flex-1 p-4 space-y-2">
                <button @click="currentTab = 'chat'" :class="{'bg-blue-100 text-blue-700': currentTab === 'chat'}" class="w-full text-left p-3 rounded font-medium">💬 法律问答</button>
                <button @click="currentTab = 'search'" :class="{'bg-blue-100 text-blue-700': currentTab === 'search'}" class="w-full text-left p-3 rounded font-medium">🔍 知识库检索</button>
                <button @click="currentTab = 'ocr'" :class="{'bg-blue-100 text-blue-700': currentTab === 'ocr'}" class="w-full text-left p-3 rounded font-medium">📄 文件识别审查</button>
                <button @click="currentTab = 'doc'" :class="{'bg-blue-100 text-blue-700': currentTab === 'doc'}" class="w-full text-left p-3 rounded font-medium">✍️ AI文书自动撰写</button>
            </nav>
        </div>

        <div class="flex-1 p-8 overflow-y-auto">

            <div v-if="currentTab === 'chat'" class="bg-white p-6 rounded-lg shadow h-full flex flex-col">
                <h2 class="text-2xl font-bold mb-4">法律问答 (预留接入AI)</h2>
                <div class="flex-1 bg-gray-50 rounded p-4 mb-4 overflow-y-auto">
                    <div v-for="(msg, index) in chatHistory" :key="index" class="mb-4">
                        <div :class="msg.role === 'user' ? 'text-blue-600 font-bold' : 'text-green-600 font-bold'">
                            {{ msg.role === 'user' ? '🧑 用户：' : '🤖 AI：' }}
                        </div>
                        <div class="mt-1 text-gray-700">{{ msg.content }}</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input v-model="chatInput" @keyup.enter="sendChat" type="text" placeholder="输入法律问题..." class="flex-1 border p-2 rounded">
                    <button @click="sendChat" class="bg-blue-600 text-white px-6 py-2 rounded">发送</button>
                </div>
            </div>

            <div v-if="currentTab === 'search'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-4">知识库检索</h2>
                <div class="flex gap-2 mb-6">
                    <input v-model="searchKeyword" @keyup.enter="doSearch" type="text" placeholder="输入关键词..." class="flex-1 border p-2 rounded">
                    <button @click="doSearch" class="bg-blue-600 text-white px-6 py-2 rounded">检索</button>
                </div>
                <div v-if="searchResults.length > 0" class="space-y-4">
                    <div v-for="(res, index) in searchResults" :key="index" class="p-4 border border-l-4 border-l-blue-500 rounded bg-gray-50">
                        <h3 class="font-bold text-lg text-gray-800">{{ res.title }}</h3>
                        <p class="text-gray-600 mt-2">{{ res.content }}</p>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'ocr'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-4">智能文件审查</h2>
                <input type="file" @change="handleFileUpload" class="mb-4 block">
                <button @click="doOcr" class="bg-blue-600 text-white px-4 py-2 rounded mb-6">上传并分析</button>
                <div v-if="ocrResult" class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded border"><h3 class="font-bold">📝 提取原文</h3><pre class="whitespace-pre-wrap text-sm">{{ ocrResult.text }}</pre></div>
                    <div class="bg-red-50 p-4 rounded border"><h3 class="font-bold text-red-700">⚠️ AI风险审查</h3><p class="text-red-600">{{ ocrResult.risk }}</p></div>
                </div>
            </div>

            <div v-if="currentTab === 'doc'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-6">AI 文书与合同智能起草</h2>

                <div class="flex gap-8 h-[calc(100%-4rem)]">
                    <div class="flex-1 space-y-4 pr-6 border-r flex flex-col">
                        <label class="block font-bold text-gray-700">第一步：选择文书并填写大纲</label>
                        <select v-model="docForm.doc_type" @change="resetAiText" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-blue-500">
                            <option value="contract">📝 通用合同智能撰写</option>
                            <option value="complaint">⚖️ 民事起诉状撰写</option>
                        </select>

                        <div v-if="docForm.doc_type === 'contract'" class="space-y-3 flex-1 flex flex-col">
                            <div><label class="block text-sm text-gray-600">合同名称</label><input v-model="docForm.contract_name" class="w-full border p-2 rounded"></div>
                            <div class="flex gap-2">
                                <div class="flex-1"><label class="text-sm text-gray-600">甲方</label><input v-model="docForm.party_a" class="w-full border p-2 rounded"></div>
                                <div class="flex-1"><label class="text-sm text-gray-600">乙方</label><input v-model="docForm.party_b" class="w-full border p-2 rounded"></div>
                            </div>
                            <div class="flex-1 flex flex-col">
                                <label class="text-sm font-bold text-gray-600">核心交易条件与业务诉求 (告诉AI合同里必须包含什么)</label>
                                <textarea v-model="docForm.requirements" placeholder="请用大白话描述..." class="w-full flex-1 border p-2 rounded resize-none"></textarea>
                            </div>
                        </div>

                        <div v-if="docForm.doc_type === 'complaint'" class="space-y-3 flex-1 flex flex-col">
                            <div><label class="text-sm text-gray-600">原告姓名</label><input v-model="docForm.plaintiff" class="w-full border p-2 rounded"></div>
                            <div><label class="text-sm text-gray-600">被告姓名</label><input v-model="docForm.defendant" class="w-full border p-2 rounded"></div>
                            <div class="flex-1 flex flex-col">
                                <label class="text-sm font-bold text-gray-600">诉讼请求提纲 (简单描述诉求即可)</label>
                                <textarea v-model="docForm.demand" placeholder="例如：要求被告退还押金5000元..." class="w-full flex-1 border p-2 rounded resize-none"></textarea>
                            </div>
                        </div>

                        <button @click="draftText" :disabled="isGenerating" class="bg-blue-600 text-white py-3 rounded hover:bg-blue-700 font-bold shadow disabled:bg-gray-400 transition-all">
                            {{ isGenerating ? '🤖 正在向大模型请求撰写...' : '✨ 一键生成条款正文 ➡️' }}
                        </button>
                    </div>

                    <div class="flex-1 flex flex-col">
                        <label class="block mb-2 font-bold text-gray-700">第二步：预览修改与导出文档</label>

                        <div v-if="docForm.ai_text === null" class="flex-1 border-2 border-dashed rounded-lg flex items-center justify-center text-gray-400 bg-gray-50">
                            请在左侧填写信息并点击一键生成
                        </div>

                        <div v-else class="flex-1 flex flex-col space-y-4">
                            <textarea v-model="docForm.ai_text" class="w-full flex-1 border-2 border-blue-300 p-4 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 leading-relaxed resize-none"></textarea>

                            <button @click="exportWord" class="bg-green-600 text-white py-3 rounded hover:bg-green-700 font-bold shadow text-lg flex justify-center items-center gap-2">
                                📥 内容无误，导出 Word 文档
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        createApp({
            setup() {
                const baseUrl = 'http://127.0.0.1:5000/api';
                const currentTab = ref('doc');

                // 模块 1-3 的交互逻辑完全保持不变
                const chatInput = ref('');
                const chatHistory = ref([]);
                const sendChat = async () => {
                    if(!chatInput.value) return;
                    chatHistory.value.push({ role: 'user', content: chatInput.value });
                    const msg = chatInput.value;
                    chatInput.value = '思考中...';
                    try {
                        const res = await fetch(`${baseUrl}/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: msg }) });
                        const data = await res.json();
                        chatInput.value = '';
                        chatHistory.value.push({ role: 'assistant', content: data.data.reply });
                    } catch(e) { chatInput.value = ''; }
                };

                const searchKeyword = ref('');
                const searchResults = ref([]);
                const doSearch = async () => {
                    if(!searchKeyword.value) return;
                    const res = await fetch(`${baseUrl}/search?keyword=${searchKeyword.value}`);
                    const data = await res.json();
                    searchResults.value = data.data.results;
                };

                const selectedFile = ref(null);
                const ocrResult = ref(null);
                const handleFileUpload = (event) => { selectedFile.value = event.target.files[0]; };
                const doOcr = async () => {
                    if(!selectedFile.value) return;
                    const formData = new FormData();
                    formData.append('file', selectedFile.value);
                    const res = await fetch(`${baseUrl}/ocr`, { method: 'POST', body: formData });
                    const data = await res.json();
                    ocrResult.value = data.data;
                };

                // 模块 4 全新逻辑
                const isGenerating = ref(false);
                const docForm = reactive({
                    doc_type: 'contract',
                    plaintiff: '', defendant: '', demand: '',
                    contract_name: '', party_a: '', party_b: '', requirements: '',
                    ai_text: null
                });

                const resetAiText = () => { docForm.ai_text = null; };

                // 触发后端 Gemini 服务撰写正文
                const draftText = async () => {
                    if (docForm.doc_type === 'complaint' && (!docForm.plaintiff || !docForm.demand)) return alert("请填写原告和诉讼请求提纲");
                    if (docForm.doc_type === 'contract' && (!docForm.contract_name || !docForm.requirements)) return alert("请填写合同名称和诉求");

                    isGenerating.value = true;
                    try {
                        const res = await fetch(`${baseUrl}/generate_text`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(docForm)
                        });
                        const resData = await res.json();
                        if(resData.code === 200) docForm.ai_text = resData.data.text;
                        else alert(resData.msg);
                    } catch(e) {
                        alert("请求大模型失败，请检查后端运行状态和 API_KEY 是否配置正确。");
                    } finally {
                        isGenerating.value = false;
                    }
                };

                // 将用户修改确认后的正文发给后端，渲染 Word 模板并下载
                const exportWord = async () => {
                    try {
                        const res = await fetch(`${baseUrl}/export_word`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(docForm)
                        });

                        if (!res.ok || res.headers.get("content-type")?.includes("application/json")) {
                            const errorData = await res.json();
                            return alert("导出失败：" + errorData.msg);
                        }

                        const blob = await res.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;

                        let fileName = "生成文书.docx";
                        const disposition = res.headers.get('Content-Disposition');
                        if (disposition && disposition.indexOf('filename=') !== -1) {
                            fileName = decodeURIComponent(disposition.split('filename=')[1].replace(/UTF-8''/, '').replace(/"/g, ''));
                        }
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                    } catch(e) {
                        alert("导出 Word 失败。");
                    }
                };

                return { currentTab, chatInput, chatHistory, sendChat, searchKeyword, searchResults, doSearch, handleFileUpload, doOcr, ocrResult, docForm, isGenerating, resetAiText, draftText, exportWord }
            }
        }).mount('#app')
    </script>
</body>
</html>
