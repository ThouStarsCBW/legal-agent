<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 智慧法律助手</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="auth.js"></script>
  <style>
    :root {
      --bg: #000b2b;
      --neon: #00a2ff;
      --cyan: #00ffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", sans-serif;
      background: radial-gradient(ellipse 100% 80% at 50% -20%, #0a2860 0%, var(--bg) 45%, #00051a 100%);
      color: #e8f4ff;
      overflow-x: hidden;
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 162, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 162, 255, 0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      z-index: 0;
    }
    .bg-glow {
      position: fixed;
      width: 80vmax;
      height: 80vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 162, 255, 0.12) 0%, transparent 55%);
      top: -30%;
      left: 10%;
      pointer-events: none;
      z-index: 0;
    }
    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo-mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      border: 2px solid var(--neon);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0, 162, 255, 0.4), inset 0 0 20px rgba(0, 162, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo-mark::before {
      content: "";
      width: 12px;
      height: 12px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--cyan);
    }
    .logo-mark::after {
      content: "";
      position: absolute;
      width: 120%;
      height: 40%;
      border: 1px solid rgba(0, 162, 255, 0.35);
      border-radius: 4px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    h1 {
      text-align: center;
      font-family: "Orbitron", "Noto Sans SC", sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.12em;
      margin: 0 0 0.35rem;
      text-shadow: 0 0 24px rgba(0, 162, 255, 0.5);
    }
    .sub {
      text-align: center;
      font-size: 0.8rem;
      color: #6a9fd4;
      margin-bottom: 1.75rem;
    }
    .hud {
      width: 100%;
      max-width: 420px;
      padding: 2rem 2rem 1.75rem;
      background: rgba(0, 20, 55, 0.75);
      border: 1px solid rgba(0, 162, 255, 0.45);
      clip-path: polygon(
        12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px),
        calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px
      );
      box-shadow:
        0 0 40px rgba(0, 100, 200, 0.25),
        inset 0 0 60px rgba(0, 80, 160, 0.08);
      backdrop-filter: blur(12px);
    }
    .field {
      display: flex;
      align-items: stretch;
      margin-bottom: 1rem;
      border: 1px solid rgba(0, 162, 255, 0.35);
      background: rgba(0, 15, 45, 0.85);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 14px rgba(0, 255, 255, 0.15);
    }
    .field-icon {
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neon);
      border-right: 1px solid rgba(0, 162, 255, 0.25);
      font-size: 1rem;
    }
    .field input {
      flex: 1;
      border: none;
      background: transparent;
      color: #e8f4ff;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      outline: none;
    }
    .field input::placeholder {
      color: #5a7aa0;
    }
    .captcha-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }
    .captcha-row .field {
      flex: 1;
      margin-bottom: 0;
    }
    .captcha-box {
      width: 100px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Orbitron", monospace;
      font-size: 1.25rem;
      letter-spacing: 0.15em;
      color: #001428;
      background: linear-gradient(180deg, #e8f4ff 0%, #b8d4f0 100%);
      border: 1px solid rgba(0, 162, 255, 0.5);
      user-select: none;
      cursor: pointer;
    }
    .row-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 1rem 0 1.25rem;
      font-size: 0.85rem;
      color: #7a9cc4;
    }
    .row-check input {
      accent-color: var(--neon);
    }
    .btn-login {
      width: 100%;
      padding: 0.95rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(180deg, #00a2ff 0%, #0070c0 100%);
      box-shadow: 0 4px 24px rgba(0, 162, 255, 0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(0, 200, 255, 0.55);
    }
    .link-reg {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.88rem;
      color: #6a9fd4;
    }
    .link-reg a {
      color: var(--cyan);
      text-decoration: none;
    }
    .link-reg a:hover {
      text-decoration: underline;
    }
    .err {
      color: #ff6688;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      min-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="wrap">
    <div class="hud">
      <div class="logo-mark"></div>
      <h1>智慧法律助手</h1>
      <p class="sub">可视化调度 · 智能法律咨询终端</p>
      <div id="err" class="err"></div>
      <form id="form">
        <div class="field">
          <span class="field-icon">👤</span>
          <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" />
        </div>
        <div class="field">
          <span class="field-icon">🔒</span>
          <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" />
        </div>
        <div class="captcha-row">
          <div class="field" style="margin-bottom: 1rem;">
            <span class="field-icon">⌗</span>
            <input type="text" id="captchaIn" placeholder="请输入验证码" maxlength="6" autocomplete="off" />
          </div>
          <div class="captcha-box" id="captchaDisplay" title="点击刷新"></div>
        </div>
        <div class="row-check">
          <input type="checkbox" id="remember" />
          <label for="remember">记住密码（仅保存用户名到本地）</label>
        </div>
        <button type="submit" class="btn-login">登录</button>
      </form>
      <p class="link-reg">没有账号？<a href="register.html">注册新用户</a></p>
    </div>
  </div>
  <script>
    (function () {
      if (sessionStorage.getItem("auth_token")) {
        window.location.replace("index.html");
        return;
      }
      var cap = "";
      function refreshCaptcha() {
        var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        cap = "";
        for (var i = 0; i < 4; i++) cap += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById("captchaDisplay").textContent = cap;
      }
      refreshCaptcha();
      document.getElementById("captchaDisplay").onclick = refreshCaptcha;

      var saved = localStorage.getItem("legal_saved_username");
      if (saved) {
        document.getElementById("username").value = saved;
        document.getElementById("remember").checked = true;
      }

      document.getElementById("form").onsubmit = async function (e) {
        e.preventDefault();
        document.getElementById("err").textContent = "";
        var u = document.getElementById("username").value.trim();
        var p = document.getElementById("password").value;
        var c = document.getElementById("captchaIn").value.trim().toUpperCase();
        if (!u || !p) {
          document.getElementById("err").textContent = "请输入用户名和密码";
          return;
        }
        if (c !== cap) {
          document.getElementById("err").textContent = "验证码错误";
          refreshCaptcha();
          return;
        }
        try {
          var res = await fetch("http://127.0.0.1:5000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p }),
          });
          var data = await res.json();
          if (data.code !== 200) {
            document.getElementById("err").textContent = data.msg || "登录失败";
            refreshCaptcha();
            return;
          }
          sessionStorage.setItem("auth_token", data.data.token);
          if (document.getElementById("remember").checked) {
            localStorage.setItem("legal_saved_username", u);
          } else {
            localStorage.removeItem("legal_saved_username");
          }
          window.location.href = "index.html";
        } catch (err) {
          document.getElementById("err").textContent = "网络错误，请确认后端已启动";
        }
      };
    })();
  </script>
</body>
</html>
