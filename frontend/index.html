<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>D06 智慧法律助手原型</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="flex h-screen">

        <div class="w-64 bg-white shadow-lg flex flex-col">
            <div class="p-6 bg-blue-600 text-white text-xl font-bold">⚖️ 智慧法律系统</div>
            <nav class="flex-1 p-4 space-y-2">
                <button @click="currentTab = 'chat'" :class="{'bg-blue-100 text-blue-700': currentTab === 'chat'}" class="w-full text-left p-3 rounded hover:bg-gray-100">💬 法律问答</button>
                <button @click="currentTab = 'search'" :class="{'bg-blue-100 text-blue-700': currentTab === 'search'}" class="w-full text-left p-3 rounded hover:bg-gray-100">🔍 知识库检索</button>
                <button @click="currentTab = 'ocr'" :class="{'bg-blue-100 text-blue-700': currentTab === 'ocr'}" class="w-full text-left p-3 rounded hover:bg-gray-100">📄 文件识别审查</button>
                <button @click="currentTab = 'doc'" :class="{'bg-blue-100 text-blue-700': currentTab === 'doc'}" class="w-full text-left p-3 rounded hover:bg-gray-100">✍️ 文书撰写</button>
            </nav>
        </div>

        <div class="flex-1 p-8 overflow-y-auto">

            <div v-if="currentTab === 'chat'" class="bg-white p-6 rounded-lg shadow h-full flex flex-col">
                <h2 class="text-2xl font-bold mb-4">法律问答 (对接腾讯元器)</h2>
                <div class="flex-1 bg-gray-50 rounded p-4 mb-4 overflow-y-auto">
                    <div v-for="(msg, index) in chatHistory" :key="index" class="mb-4">
                        <div :class="msg.role === 'user' ? 'text-blue-600 font-bold' : 'text-green-600 font-bold'">
                            {{ msg.role === 'user' ? '🧑 用户：' : '🤖 AI：' }}
                        </div>
                        <div class="mt-1 text-gray-700">{{ msg.content }}</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input v-model="chatInput" @keyup.enter="sendChat" type="text" placeholder="输入法律问题..." class="flex-1 border p-2 rounded">
                    <button @click="sendChat" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">发送</button>
                </div>
            </div>

            <div v-if="currentTab === 'search'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-4">知识库检索 (对接得理API)</h2>
                <div class="flex gap-2 mb-6">
                    <input v-model="searchKeyword" type="text" placeholder="输入案由、法条关键词..." class="flex-1 border p-2 rounded">
                    <button @click="doSearch" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">检索</button>
                </div>
                <div v-if="searchResults.length > 0" class="space-y-4">
                    <div v-for="(res, index) in searchResults" :key="index" class="p-4 border border-l-4 border-l-blue-500 rounded bg-gray-50">
                        <h3 class="font-bold text-lg text-gray-800">{{ res.title }}</h3>
                        <p class="text-gray-600 mt-2">{{ res.content }}</p>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'ocr'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-4">智能文件审查</h2>
                <input type="file" @change="handleFileUpload" class="mb-4 block">
                <button @click="doOcr" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 mb-6">上传并分析</button>

                <div v-if="ocrResult" class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded border">
                        <h3 class="font-bold text-lg mb-2 text-gray-700">📝 提取原文</h3>
                        <pre class="whitespace-pre-wrap text-sm">{{ ocrResult.text }}</pre>
                    </div>
                    <div class="bg-red-50 p-4 rounded border border-red-200">
                        <h3 class="font-bold text-lg mb-2 text-red-700">⚠️ AI风险审查</h3>
                        <p class="text-red-600">{{ ocrResult.risk }}</p>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'doc'" class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-2xl font-bold mb-4">自动文书生成</h2>
                <div class="space-y-4 max-w-lg">
                    <div><label class="block mb-1">原告姓名</label><input v-model="docForm.plaintiff" type="text" class="w-full border p-2 rounded"></div>
                    <div><label class="block mb-1">被告姓名</label><input v-model="docForm.defendant" type="text" class="w-full border p-2 rounded"></div>
                    <div><label class="block mb-1">诉讼请求提纲</label><textarea v-model="docForm.demand" class="w-full border p-2 rounded h-24"></textarea></div>
                    <button @click="generateDoc" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">🚀 生成 Word 文档</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        createApp({
            setup() {
                const baseUrl = 'http://127.0.0.1:5000/api';
                const currentTab = ref('chat');

                // 模块1：聊天逻辑
                const chatInput = ref('');
                const chatHistory = ref([]);
                const sendChat = async () => {
                    if(!chatInput.value) return;
                    chatHistory.value.push({ role: 'user', content: chatInput.value });
                    const msg = chatInput.value;
                    chatInput.value = '正在思考...';

                    try {
                        const res = await fetch(`${baseUrl}/chat`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ message: msg })
                        });
                        const data = await res.json();
                        chatInput.value = '';
                        chatHistory.value.push({ role: 'assistant', content: data.data.reply });
                    } catch(e) { alert("后端服务未启动或连接失败！"); chatInput.value = '';}
                };

                // 模块2：检索逻辑
                const searchKeyword = ref('');
                const searchResults = ref([]);
                const doSearch = async () => {
                    if(!searchKeyword.value) return;
                    const res = await fetch(`${baseUrl}/search?keyword=${searchKeyword.value}`);
                    const data = await res.json();
                    searchResults.value = data.data.results;
                };

                // 模块3：OCR逻辑
                const selectedFile = ref(null);
                const ocrResult = ref(null);
                const handleFileUpload = (event) => { selectedFile.value = event.target.files[0]; };
                const doOcr = async () => {
                    if(!selectedFile.value) return alert("请先选择文件");
                    const formData = new FormData();
                    formData.append('file', selectedFile.value);
                    const res = await fetch(`${baseUrl}/ocr`, { method: 'POST', body: formData });
                    const data = await res.json();
                    ocrResult.value = data.data;
                };

                // 模块4：文档生成逻辑
                const docForm = reactive({ plaintiff: '', defendant: '', demand: '' });
                const generateDoc = async () => {
                    if(!docForm.plaintiff) return alert("请填写必要信息");
                    const res = await fetch(`${baseUrl}/generate`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(docForm)
                    });
                    // 处理文件下载
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${docForm.plaintiff}起诉状.docx`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                };

                return {
                    currentTab, chatInput, chatHistory, sendChat,
                    searchKeyword, searchResults, doSearch,
                    handleFileUpload, doOcr, ocrResult,
                    docForm, generateDoc
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
